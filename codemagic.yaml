workflows:
  android-release:
    name: ProPDF Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      java: 17
      android_signing:
        - propdf_keystore
      groups:
        - google_credentials
      vars:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx8192m"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Set up local properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Run tests
        script: |
          ./gradlew testDebugUnitTest

      - name: Build release APK
        script: |
          ./gradlew assembleRelease

      - name: Build release AAB
        script: |
          ./gradlew bundleRelease
    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GOOGLE_PLAY_CREDENTIALS
        track: internal
        submit_as_draft: true

  android-debug:
    name: ProPDF Android Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Build debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
